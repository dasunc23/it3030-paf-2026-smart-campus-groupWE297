spring.application.name=smart-campus-backend
server.port=8081

# ====================== MySQL Database ======================
spring.datasource.url=jdbc:mysql://localhost:3306/paf_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=cutterviha12

# JPA Settings - Fixed for Hibernate 7
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Use this (no version number)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Helpful logging
logging.level.com.zaxxer.hikari=INFO
logging.level.org.hibernate.SQL=DEBUG

# ====================== File Upload (Fix: enable real image uploads) ======================
# Allow multipart uploads up to 10 MB per file, 30 MB total per request
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ====================== Static Resource Serving (Fix: serve uploaded images) ======================
# Files saved to ./uploads/ are served at http://localhost:8081/uploads/**
spring.web.resources.static-locations=classpath:/static/,file:uploads/
